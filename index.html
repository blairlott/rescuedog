    <!-- Vinoshipper Injector — owns wine cart + checkout (PCI / age verify / tax / shipping). -->
    <script>
      window.document.addEventListener('vinoshipper:loaded', function () {
        try {
          window.Vinoshipper.init(2212, {
            // No simple theme — we drive look via Advanced CSS Variables
            // in src/index.css (RDW brand: red #c30017, black, Nunito Sans,
            // sharp 0-radius). Docs note simple + advanced conflict.
            cartPosition: 'end',
            cartButton: false,
            // Suppress Vinoshipper's own slide-out cart UI entirely.
            // Our app drives the cart UX and hands off straight to the
            // hosted checkout URL — we never want VS's drawer to appear
            // on top of ours (it confused customers post-order).
            cartOpenOnAdd: false,
            cartOpenOnLoad: false,
            showCart: false,
          });
        } catch (e) {
          console.error('[Vinoshipper] init failed', e);
        }
      }, false);
    </script>
    <script src="https://vinoshipper.com/injector/index.js" async></script>
    <script>
      // Belt-and-suspenders: HIDE any Vinoshipper UI the injector adds
      // to the page. Our app owns the cart UX — VS's slide-out cart
      // must never appear to the customer.
      //
      // IMPORTANT: We HIDE instead of REMOVE because the injector keeps
      // internal references to its own DOM nodes (e.g. cart container)
      // and calls things like `el.classList.toggle(...)` on them during
      // onProductAdd → cartOpen flows. Removing the nodes makes those
      // references undefined and crashes the injector with
      // "Cannot read properties of undefined (reading 'classList')",
      // which surfaces to the customer as "Wine checkout unavailable".
      (function () {
        var SELECTORS = [
          '[id*="vinoshipper" i]',
          '[class*="vinoshipper" i]',
          '[id^="vs-"]',
          '[class^="vs-"]',
          '[class*=" vs-"]',
          'iframe[src*="vinoshipper.com"]',
        ];
        var SEL = SELECTORS.join(',');
        var STYLE_ID = 'rdw-vs-hide-style';
        if (!document.getElementById(STYLE_ID)) {
          var st = document.createElement('style');
          st.id = STYLE_ID;
          // Visually neutralize without detaching from DOM.
          st.textContent = SEL + ' { position: fixed !important; left: -99999px !important; top: -99999px !important; width: 1px !important; height: 1px !important; opacity: 0 !important; pointer-events: none !important; z-index: -1 !important; }';
          (document.head || document.documentElement).appendChild(st);
        }
        function nuke(root) {
          try {
            (root || document).querySelectorAll(SEL).forEach(function (el) {
              if (el.closest && el.closest('[data-rdw-keep-vs]')) return;
              // Hide (don't remove) so injector's internal refs stay valid.
              el.setAttribute('aria-hidden', 'true');
              el.setAttribute('data-rdw-vs-hidden', 'true');
            });
          } catch (e) { /* ignore */ }
        }
        nuke();
        if (typeof MutationObserver !== 'undefined') {
          var mo = new MutationObserver(function (mutations) {
            for (var i = 0; i < mutations.length; i++) {
              var m = mutations[i];
              if (m.addedNodes && m.addedNodes.length) {
                nuke(document);
                break;
              }
            }
          });
          mo.observe(document.documentElement, { childList: true, subtree: true });
        }
      })();
    </script>
